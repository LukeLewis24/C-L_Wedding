<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invitation — Catherine & Luke</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg"></div>
<div class="petals"></div>
  <div class="center">
    <div class="card fade-in">

      <h1>Catherine & Luke</h1>
      <div class="subtitle">16 June 2027</div>

      <iframe src="assets/wedding-invite.pdf"></iframe>

      <button onclick="window.open('assets/wedding-invite.pdf')">
        VIEW FULL SCREEN
      </button>

    </div>
  </div>
<script>
  const petalsContainer = document.querySelector('.petals');

  const petalCount = 18;

  for (let i = 0; i < petalCount; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';

    // random positioning
    petal.style.left = Math.random() * 100 + 'vw';

    // random size
    const size = 6 + Math.random() * 8;
    petal.style.width = size + 'px';
    petal.style.height = size * 0.6 + 'px';

    // random speed
    const duration = 8 + Math.random() * 10;
    petal.style.animationDuration = duration + 's';

    // random delay so they don’t sync
    petal.style.animationDelay = Math.random() * 5 + 's';

    petalsContainer.appendChild(petal);
  }
</script>
</body>
</html>
