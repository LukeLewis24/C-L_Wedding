<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catherine & Luke | Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="password-screen" id="passwordScreen">

    <div class="login-box">

        <h1>Catherine & Luke</h1>

        <p>Please enter the password</p>

        <input
            type="password"
            id="passwordInput"
            placeholder="Password">

        <button onclick="checkPassword()">
            Enter
        </button>

        <div id="error"></div>

    </div>

</div>


<div class="main-page hidden" id="mainPage">

    <h1 class="names">
        Catherine & Luke
    </h1>

    <h2>
        16 June 2027
    </h2>

    <div class="envelope-container">

        <div class="envelope" onclick="openEnvelope()">

            <div class="flap"></div>

            <div class="letter">

                <img src="assets/Wedding Invite - Luke.png">

            </div>

            <div class="seal">
                ❤
            </div>

        </div>

    </div>

    <div class="hidden" id="buttons">

        <a
          href="assets/e-Wedding%20Invite.pdf"
          target="_blank">

            <button>
                Open Invitation
            </button>

        </a>

    </div>

    <div class="countdown">

        <h3>Until our special day</h3>

        <div id="timer"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
